services:
  - type: web
    name: shadowsaas-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URL
        sync: false          # You'll paste Atlas connection string here
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: SNIFFER_API_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false          # You'll paste your Vercel URL here after deploying frontend
      - key: ML_AUTO_TRAIN
        value: "true"
      - key: POLICY_EVAL_INTERVAL_SECONDS
        value: "60"
      - key: UEBA_RECOMPUTE_INTERVAL_SEC
        value: "3600"
